version: "3.9"

services:
  db:
    image: postgis/postgis:15-3.4
    container_name: agri_db
    env_file:
      - .env
    environment:
      POSTGRES_DB: agri_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d agri_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agri_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agri_backend
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    restart: on-failure
    networks:
      - agri_network

  ollama:
    image: ollama/ollama:latest
    container_name: agri_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - agri_network

volumes:
  postgres_data:
  ollama_data:

networks:
  agri_network:
    driver: bridge
